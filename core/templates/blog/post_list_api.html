{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="{% static 'js/JQuery.js' %}"></script>
</head>
<body>
<h1>Blog List</h1>

<ol id="blog-list">

</ol>



<script>
    $.get('/blog/api/v1/post/',
    function (data, status,jqXHR){
        for (post of data.results){
            $('#blog-list').append(`<li><a href=${post.absolute_url}><h2>${post.title}</h2></a></li>`)
        }
    })
</script>
</body>
</html>
